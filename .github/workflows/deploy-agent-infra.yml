name: Deploy Agent Infra (VPS)

on:
  push:
    branches: [main]
    paths:
      - 'agent-infra-langchain-ts/**'
      - '.github/workflows/deploy-agent-infra.yml'
  workflow_dispatch:

concurrency:
  group: deploy-agent-infra
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            REPO_PATH="${{ secrets.VPS_REPO_PATH }}"
            SERVICE_NAME="${{ secrets.AGENT_INFRA_SERVICE_NAME }}"
            if [ -z "$SERVICE_NAME" ]; then SERVICE_NAME="naisu-agent-infra.service"; fi

            cd "$REPO_PATH"
            git fetch origin
            git checkout main
            git pull --ff-only origin main

            cd agent-infra-langchain-ts

            if command -v pnpm >/dev/null 2>&1; then
              pnpm install --frozen-lockfile || pnpm install
            else
              npm install
            fi

            sudo systemctl restart "$SERVICE_NAME"
            sleep 3
            sudo systemctl --no-pager --full status "$SERVICE_NAME" | sed -n '1,40p'

            curl -fsS http://127.0.0.1:8787/health >/dev/null
            echo "Agent infra deploy OK"
